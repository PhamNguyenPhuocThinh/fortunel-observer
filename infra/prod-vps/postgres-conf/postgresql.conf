# Postgres tuning for the VPS prod stack.
# Conservative defaults for a 4 GB RAM VPS shared with Redis + Bot + Caddy.
# Re-tune if you move to a larger box.

listen_addresses = '*'

# Memory
shared_buffers = 512MB
effective_cache_size = 1500MB
work_mem = 16MB
maintenance_work_mem = 128MB

# Connections
max_connections = 100

# WAL / durability
wal_level = replica
fsync = on
synchronous_commit = on
wal_compression = on
max_wal_size = 1GB
min_wal_size = 256MB

# Background writer
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# Logging
log_destination = 'stderr'
log_min_duration_statement = 250ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_line_prefix = '%t [%p] %u@%d '

# Extensions
shared_preload_libraries = 'timescaledb,pg_stat_statements'

# Statistics
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# Timescale
timescaledb.telemetry_level = off

# Statement timeout - kill runaway queries from the bot or webhook handlers
statement_timeout = 30000  # 30s
idle_in_transaction_session_timeout = 60000  # 60s
