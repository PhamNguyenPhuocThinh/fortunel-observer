name = "fortunel-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Local dev defaults
[vars]
NODE_ENV = "development"
LOG_LEVEL = "debug"
CORS_ALLOWED_ORIGINS = "http://localhost:4321,http://localhost:8787"

# Local dev: use .dev.vars (gitignored) for DATABASE_URL, BETTER_AUTH_SECRET, etc.

# KV bindings for local dev — wrangler auto-mocks these to local SQLite when --local is used.
# Replace IDs with real namespaces from `wrangler kv:namespace create RATE_LIMIT` before staging deploy.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "rate_limit_local_placeholder"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "session_cache_local_placeholder"

# ---- staging ---------------------------------------------------------------
[env.staging]
name = "fortunel-api-staging"
route = { pattern = "staging.api.fortunel.dev/*", zone_name = "fortunel.dev" }
vars = { NODE_ENV = "staging", LOG_LEVEL = "info", CORS_ALLOWED_ORIGINS = "https://staging.fortunel.dev" }

# KV bindings — fill IDs after `wrangler kv:namespace create RATE_LIMIT --env staging`
[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_STAGING_RATE_LIMIT_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SESSION_CACHE"
id = "REPLACE_WITH_STAGING_SESSION_CACHE_KV_ID"

# R2
# [[env.staging.r2_buckets]]
# binding = "ASSETS"
# bucket_name = "fortunel-assets-staging"

# ---- prod ------------------------------------------------------------------
[env.prod]
name = "fortunel-api-prod"
route = { pattern = "api.fortunel.dev/*", zone_name = "fortunel.dev" }
vars = { NODE_ENV = "production", LOG_LEVEL = "info", CORS_ALLOWED_ORIGINS = "https://fortunel.dev" }

[[env.prod.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_PROD_RATE_LIMIT_KV_ID"

[[env.prod.kv_namespaces]]
binding = "SESSION_CACHE"
id = "REPLACE_WITH_PROD_SESSION_CACHE_KV_ID"

# [[env.prod.r2_buckets]]
# binding = "ASSETS"
# bucket_name = "fortunel-assets-prod"

# Phase D: add Hyperdrive binding (replaces Neon serverless driver)
# [[env.prod.hyperdrive]]
# binding = "DB"
# id = "<hyperdrive-id>"

# Observability
[observability]
enabled = true

[placement]
mode = "smart"
