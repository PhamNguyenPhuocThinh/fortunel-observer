name: ci-python

on:
  push:
    branches: [main]
    paths:
      - "apps/bot/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "apps/bot/**"
      - ".github/workflows/ci-python.yml"

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Typecheck (mypy, best-effort)
        run: uv run mypy src
        continue-on-error: true

      - name: Test
        run: uv run pytest --cov=src/bot --cov-report=term-missing
